<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1584px; height: 396px; overflow: hidden; background: #000; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    color: #fff;
    position: relative;
  }

  .stage {
    position: absolute; inset: 0;
    background: #000;
    overflow: hidden;
  }

  /* 4K frame from the hero render — drop a frame export at ./banner-bg.png
     before opening the file (render.sh does this for you). object-position
     trims the warehouse to the most-densely-reconstructed strip. */
  .bg-frame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 38%;
    z-index: 0;
  }

  /* Darkening + contrast scrim so the headline stays readable
     over the busy wireframe scene. */
  .bg-scrim {
    position: absolute; inset: 0;
    z-index: 2;
    background:
      radial-gradient(ellipse 55% 90% at 72% 50%, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.15) 70%, rgba(0,0,0,0) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0) 65%, rgba(0,0,0,0.45) 100%),
      linear-gradient(90deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  /* Faint scanlines layered over the whole stage */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 6;
  }

  /* Headline — left:46% / width:820 keeps the text clear of the LinkedIn
     avatar circle on the left side of the banner. */
  .headline {
    position: absolute;
    left: 46%;
    top: 50%;
    transform: translateY(-50%);
    width: 820px;
    z-index: 8;
  }

  .line {
    font-size: 54px;
    font-weight: 700;
    /* Enough room so the gradient bounding box contains the "g" / "y"
       descenders — at 1.02 the gradient clip cut them off. */
    line-height: 1.15;
    letter-spacing: -0.022em;
  }
  .accent {
    background: linear-gradient(90deg, #ffb070 0%, #f97315 45%, #c95808 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .yc {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    color: #0a0a0a;
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 500;
  }
  .yc .ylogo {
    width: 18px; height: 18px;
    background: #f97315;
    color: #fff;
    border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    line-height: 1;
  }
  .yc .muted { color: #6b6b6b; font-weight: 400; }
</style>
</head>
<body>
  <div class="stage">
    <img class="bg-frame" src="./banner-bg.png" />
    <div class="bg-scrim"></div>

    <div class="headline">
      <div class="line">Turn your security cameras</div>
      <div class="line accent">into warehouse intelligence.</div>
      <div class="yc">
        <span class="muted">Backed by</span>
        <span class="ylogo">Y</span>
        <span>Combinator</span>
      </div>
    </div>

    <div class="scanlines"></div>
  </div>
</body>
</html>
