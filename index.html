<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  /* Account for the fixed header when jumping to an anchor so section
     eyebrows don't disappear under the pill. */
  #install, #comparison, #tracking-lookup, #founders, #faq, #book-demo { scroll-margin-top: 88px; }
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: #0a0a0a;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  ::selection { background: #f97315; color: #ffffff; }
  /* Light-theme scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #ffffff; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.32); }
  /* Hero text reveal — scroll-tied via CSS variables. The rAF in App.jsx
     mutates `--p` on the .hero-text container only; every per-char value
     is computed by CSS clamp() + smoothstep from `--p`, the char's
     trigger `--t`, and the reveal window `--w`. Smoothstep
     (x² · (3 − 2x)) softens the linear ramp at both ends so chars
     ease into place instead of snapping.

     Per-char effects layered into the entrance:
       • opacity 0 → 1
       • translateY 0.5em → 0  (drop in from below)
       • scale 1.25 → 1        (settle to size)
       • text-shadow flare     (orange glow that fades as the char lands)
     Everything composes onto the GPU; no JS per frame. */
  .hero-text { --p: 0; }
  /* CCTV REC indicator pulse — used during the intro phase when the
     hero video sits as a small monitor in the center of the stage. */
  @keyframes cctvPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  /* Hover affordance on the YC backing badge — multiple cues so it's
     visibly interactive: "Combinator" turns orange + gets an underline,
     the Y mark scales up and gets a stronger glow, all spans nudge up
     by 1px. */
  .yc-badge span,
  .yc-badge img { transition: color 220ms ease, transform 220ms ease, filter 220ms ease, text-decoration-color 220ms ease; }
  .yc-badge:hover span:last-child {
    color: #f97315;
    text-decoration: underline;
    text-decoration-color: #f97315;
    text-underline-offset: 4px;
    text-decoration-thickness: 2px;
  }
  .yc-badge:hover img {
    transform: scale(1.15);
    filter: drop-shadow(0 0 10px rgba(249,115,21,0.8));
  }
  .yc-badge:hover span:first-child { color: #0a0a0a; }

  /* Show only the desktop register-tab by default; swap to the
     mobile-tuned wider variant under 720px. */
  .register-tab--mobile { display: none !important; }
  .hero-char {
    display: inline-block;
    --raw: clamp(0, calc((var(--p, 0) - var(--t, 0)) / var(--w, 0.05)), 1);
    --local: calc(var(--raw) * var(--raw) * (3 - 2 * var(--raw)));
    --rev: calc(1 - var(--local));
    opacity: var(--local);
    transform: translateY(calc(var(--rev) * 0.5em)) scale(calc(1 + var(--rev) * 0.25));
    text-shadow:
      0 0 calc(var(--rev) * 22px) rgba(249, 115, 21, calc(var(--rev) * 0.85)),
      0 1px 2px rgba(0,0,0,0.85),
      0 2px 14px rgba(0,0,0,0.75),
      0 0 38px rgba(0,0,0,0.55);
    will-change: opacity, transform;
  }
  .hero-yc-pill {
    --raw: clamp(0, calc(var(--p, 0) / 0.04), 1);
    --local: calc(var(--raw) * var(--raw) * (3 - 2 * var(--raw)));
    opacity: var(--local);
    transform: translateY(calc((1 - var(--local)) * 8px));
    will-change: opacity, transform;
  }
  /* Scrollbar */
  /* (duplicate scrollbar rules removed — light-theme version is above) */

  /* Mobile responsive tweaks. Desktop keeps its inline styles untouched. */
  @media (max-width: 720px) {
    /* Hero scene fills the sticky 100vh container; the video underneath
       uses object-fit: cover so it crops cleanly to portrait viewports. */
    /* The CAMERA FEED / 3D RECONSTRUCTION indicator clutters the
       small mobile viewport; hide it on phones — the scroll-bound
       headline reveal already communicates the interactive nature. */
    .hero-bottombar { display: none !important; }
    /* Swap to the wider mobile register-tab variant. */
    .register-tab--desktop { display: none !important; }
    .register-tab--mobile  { display: block !important; }

    /* Tighten the YC badge on narrow viewports so it fits inside the
       register-tab notch (which scales with the viewport via
       preserveAspectRatio=none). */
    .yc-badge { gap: 5px !important; }
    .yc-badge span:first-child { font-size: 10px !important; }
    .yc-badge img { height: 13px !important; width: 13px !important; }
    .yc-badge span:last-child { font-size: 11px !important; }

    /* CCTV chrome on mobile — all three labels at the same size as
       REC (font-size 22). The timestamp wraps to two lines (date /
       time) so it fits next to REC without horizontal overlap. */
    .cctv-rec {
      top: 16px !important;
      left: 16px !important;
      gap: 10px !important;
      padding: 10px 18px 10px 14px !important;
      font-size: 22px !important;
      letter-spacing: 2px !important;
      border-radius: 6px !important;
    }
    .cctv-rec > span { width: 14px !important; height: 14px !important; }
    .cctv-timestamp {
      top: 16px !important;
      right: 16px !important;
      padding: 10px 14px !important;
      font-size: 22px !important;
      letter-spacing: 1.6px !important;
      border-radius: 6px !important;
    }
    .cctv-cam {
      bottom: 16px !important;
      left: 16px !important;
      padding: 10px 16px !important;
      font-size: 22px !important;
      letter-spacing: 2px !important;
      border-radius: 6px !important;
    }
    .cctv-buffer {
      bottom: 16px !important;
      right: 16px !important;
      padding: 10px 14px !important;
      font-size: 18px !important;
      letter-spacing: 1.6px !important;
      border-radius: 6px !important;
    }
  }
</style>

    <h1 style="font-size:clamp(36px,5vw,56px);line-height:1.1;letter-spacing:-1.2px;font-weight:500;margin:0 0 24px;">Turn your security cameras into dimensioners</h1>
    <p style="color:rgba(255,255,255,0.85);font-size:19px;line-height:1.5;">transload is computer vision for the loading dock. We turn the IP security cameras you already have into a 3D dimensioner that measures every pallet, parcel, and shipment in your loading hall — with no new hardware, no detours to a measuring station, and no waiting at a dimensioner booth.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">How it works</h2>
    <ol style="padding-left:20px;color:rgba(255,255,255,0.8);">
      <li style="margin-bottom:12px;"><strong>Works with your existing cameras.</strong> transload runs on the standard IP cameras you already operate — Axis, Hikvision, Bosch, Dahua, Hanwha, and most others.</li>
      <li style="margin-bottom:12px;"><strong>Zero process changes.</strong> Drivers and forklift operators do not have to change anything. No new hardware, no new workflows.</li>
      <li style="margin-bottom:12px;"><strong>Live in days, not weeks.</strong> A typical rollout takes one day to set up a pilot zone. We connect to your WMS or TMS, calibrate the camera positions, and you are live.</li>
    </ol>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">From sampling to full coverage</h2>
    <p style="color:rgba(255,255,255,0.8);">Traditional dimensioning systems — Cubiscan, Mettler-Toledo, FreightSnap, CargoSpectre, and Dockware — require a dedicated measuring station that every pallet has to be routed through. That means dimensions for samples only, forklift detours to the dimensioner, and drivers waiting at the measuring booth. transload runs continuously in the background on your existing cameras, so every shipment is measured automatically — no detours, no waiting, full terminal coverage.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">Frequently asked questions</h2>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Does transload work with our existing cameras?</h3>
    <p style="color:rgba(255,255,255,0.8);">Yes. transload runs on standard IP cameras you already have — Axis, Hikvision, Bosch, Dahua, Hanwha, and most others. No new hardware is required.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">How do you identify the scanned handling unit?</h3>
    <p style="color:rgba(255,255,255,0.8);">Our proprietary AI is triggered by the timestamp per scan event. Around that second, our AI analyzes human motion, gaze and pose to identify which item was scanned.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">How long does setup take?</h3>
    <p style="color:rgba(255,255,255,0.8);">A typical rollout takes one day to set up a pilot zone. Because it is software-only, we connect to your WMS or TMS, calibrate the camera positions, and you are live.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Does it integrate with our WMS or TMS?</h3>
    <p style="color:rgba(255,255,255,0.8);">Yes. Dimensions are linked to license plate numbers via scan timestamps and pushed into your WMS, TMS, or ERP through a standard integration.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">How does transload handle data protection?</h3>
    <p style="color:rgba(255,255,255,0.8);">transload processes data in line with the applicable local data-protection requirements — GDPR for European customers, and the equivalent frameworks elsewhere.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Do drivers or forklift operators need to change anything?</h3>
    <p style="color:rgba(255,255,255,0.8);">No. Measurement runs in the background on the cameras you already operate. There are no detours to a dimensioner station and no waiting at a measuring booth.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">Contact</h2>
