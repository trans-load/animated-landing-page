<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>transload — Computer vision for the loading dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: #fff;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  ::selection { background: #f97315; color: #0a0a0a; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Scene point cloud data (sets window.__SCENE_B64) -->
<script src="assets/scene.js"></script>

<!-- i18n (must load before Babel-transpiled components) -->
<script src="src/i18n.js"></script>

<!-- App scripts -->
<script type="text/babel" data-presets="react" src="src/Header.jsx"></script>
<script type="text/babel" data-presets="react" src="src/PointCloud.jsx"></script>
<script type="text/babel" data-presets="react" src="src/Tweaks.jsx"></script>
<script type="text/babel" data-presets="react" src="src/Comparison.jsx"></script>
<script type="text/babel" data-presets="react" src="src/ComparisonV3.jsx"></script>
<script type="text/babel" data-presets="react" src="src/BookDemo.jsx"></script>
<script type="text/babel" data-presets="react" src="src/App.jsx"></script>
</body>
</html>
