    <h1 style="font-size:clamp(36px,5vw,56px);line-height:1.1;letter-spacing:-1.2px;font-weight:500;margin:0 0 24px;">Turn your security cameras into dimensioners</h1>
    <p style="color:rgba(255,255,255,0.85);font-size:19px;line-height:1.5;">transload is computer vision for the loading dock. We turn the IP security cameras you already have into a 3D dimensioner that measures every pallet, parcel, and shipment in your loading hall — with no new hardware, no detours to a measuring station, and no waiting at a dimensioner booth.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">How it works</h2>
    <ol style="padding-left:20px;color:rgba(255,255,255,0.8);">
      <li style="margin-bottom:12px;"><strong>Works with your existing cameras.</strong> transload runs on the standard IP cameras you already operate — Axis, Hikvision, Bosch, Dahua, Hanwha, and most others.</li>
      <li style="margin-bottom:12px;"><strong>Zero process changes.</strong> Drivers and forklift operators do not have to change anything. No new hardware, no new workflows.</li>
      <li style="margin-bottom:12px;"><strong>Live in days, not weeks.</strong> A typical rollout takes one day to set up a pilot zone. We connect to your WMS or TMS, calibrate the camera positions, and you are live.</li>
    </ol>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">From sampling to full coverage</h2>
    <p style="color:rgba(255,255,255,0.8);">Traditional dimensioning systems — Cubiscan, Mettler-Toledo, FreightSnap, CargoSpectre, and Dockware — require a dedicated measuring station that every pallet has to be routed through. That means dimensions for samples only, forklift detours to the dimensioner, and drivers waiting at the measuring booth. transload runs continuously in the background on your existing cameras, so every shipment is measured automatically — no detours, no waiting, full terminal coverage.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">Frequently asked questions</h2>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Does transload work with our existing cameras?</h3>
    <p style="color:rgba(255,255,255,0.8);">Yes. transload runs on standard IP cameras you already have — Axis, Hikvision, Bosch, Dahua, Hanwha, and most others. No new hardware is required.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">How long does setup take?</h3>
    <p style="color:rgba(255,255,255,0.8);">A typical rollout takes one day to set up a pilot zone. Because it is software-only, we connect to your WMS or TMS, calibrate the camera positions, and you are live.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Does it integrate with our WMS or TMS?</h3>
    <p style="color:rgba(255,255,255,0.8);">Yes. Dimensions are linked to license plate numbers via scan timestamps and pushed into your WMS, TMS, or ERP through a standard integration.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">How does transload handle data protection?</h3>
    <p style="color:rgba(255,255,255,0.8);">transload processes data in line with the applicable local data-protection requirements — GDPR for European customers, and the equivalent frameworks elsewhere.</p>
    <h3 style="font-size:18px;font-weight:500;margin:24px 0 8px;">Do drivers or forklift operators need to change anything?</h3>
    <p style="color:rgba(255,255,255,0.8);">No. Measurement runs in the background on the cameras you already operate. There are no detours to a dimensioner station and no waiting at a measuring booth.</p>

    <h2 style="font-size:24px;font-weight:500;margin:48px 0 16px;letter-spacing:-0.5px;">Contact</h2>
