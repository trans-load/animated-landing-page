<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<title>transload — Computer vision for the loading dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  /* Account for the fixed header when jumping to an anchor so section
     eyebrows don't disappear under the pill. */
  #install, #comparison, #book-demo { scroll-margin-top: 88px; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: #fff;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  ::selection { background: #f97315; color: #0a0a0a; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

  /* Mobile responsive tweaks. Desktop keeps its inline styles untouched. */
  @media (max-width: 720px) {
    /* Match the hero scene to the warehouse photo's native aspect (756:420)
       and center it vertically in the sticky 100vh container so the full
       image is visible with no cropping. Cloud + photo both fit this box. */
    .hero-scene {
      inset: 50% 0 auto 0 !important;  /* top 50%, right 0, bottom auto, left 0 */
      width: 100% !important;
      aspect-ratio: 756 / 420 !important;
      transform: translateY(-50%) scale(2) !important;
      transform-origin: center center !important;
    }
    /* Move the CAMERA FEED / 3D RECONSTRUCTION indicator to the top-right
       of the hero on mobile so it sits above the YC "Unterstützt von"
       pill that surfaces during the scroll reveal. */
    .hero-bottombar {
      position: fixed !important;  /* pin to viewport so it stays visible through the hero scroll */
      left: auto !important;
      right: 16px !important;
      top: 76px !important;        /* just below the fixed header pill */
      bottom: auto !important;
      width: auto !important;
      gap: 8px !important;
      justify-content: flex-end !important;
      z-index: 45 !important;      /* above the hero, below the header pill (z:50) */
    }
    .hero-bottombar > div:first-child { display: none !important; }  /* hide the empty spacer div */
    .hero-progress  { min-width: 0 !important; font-size: 9px !important; letter-spacing: 1.4px !important; gap: 8px !important; }
    .hero-progress > div { width: 56px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Scene point cloud data (sets window.__SCENE_B64) -->
<script src="assets/scene.js"></script>

<!-- i18n (must load before Babel-transpiled components) -->
<script src="src/i18n.js"></script>

<!-- App scripts -->
<script type="text/babel" data-presets="react" src="src/Header.jsx"></script>
<script type="text/babel" data-presets="react" src="src/PointCloud.jsx"></script>
<script type="text/babel" data-presets="react" src="src/Tweaks.jsx"></script>
<script type="text/babel" data-presets="react" src="src/Comparison.jsx"></script>
<script type="text/babel" data-presets="react" src="src/ComparisonV3.jsx"></script>
<script type="text/babel" data-presets="react" src="src/BookDemo.jsx"></script>
<script type="text/babel" data-presets="react" src="src/App.jsx"></script>
</body>
</html>
